<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MANNA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Helping You Build Smarter Systems</h1>
    <p>Fintech & Agritech powered by intelligent systems</p>
    <button onclick="toggleChat()">Talk to MANNA AI</button>
  </section>

  <!-- CHAT BUTTON -->
  <div class="chat-toggle" onclick="toggleChat()">💬</div>

  <!-- CHAT BOX -->
  <div class="chat-box" id="chat-box-container">
    <div class="chat-header">
      MANNA AI Assistant
      <span onclick="toggleChat()">✖</span>
    </div>

    <div class="chat-messages" id="chat-box"></div>

    <div class="chat-input">
      <input id="chat-input" placeholder="Ask something..." />
      <button onclick="sendChat()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
